<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilderchronik</title>
    <link rel="icon" href="./icons/Fotogram_logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body onload="init()">
    <header class="site-header">
      <div class="header-content">
        <img src="./icons/Fotogram_Logo.svg" alt="Fotogram logo" class="logo-img" />
      </div>
    </header>

    <main class="site-content">
      <h1 class="main-title">Fotogalerie</h1>

      <section class="gallery-section">
        <div id="picGrid" class="thumbnail-grid"></div>
      </section>

      <dialog id="imgViewer" class="image-viewer">
        <figure class="viewer-content">
          <button class="ctrl-btn viewer-close" aria-label="Schließen" onclick="closeViewer()">×</button>
          <button class="ctrl-btn viewer-prev" aria-label="Zurück" onclick="prevImage()">←</button>
          <button class="ctrl-btn viewer-next" aria-label="Weiter" onclick="nextImage()">→</button>
          <img id="viewerImg" src="" alt="Großansicht" />
          <figcaption id="viewerText" class="viewer-caption"></figcaption>
        </figure>
      </dialog>
    </main>

    <footer class="site-footer">
      <div class="footer-content">
        <img src="./icons/favicon.png" alt="Seiten-Symbol" class="footer-icon" />
        <p>&copy; 2026 Maximilian Schönbrodt</p>
      </div>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
